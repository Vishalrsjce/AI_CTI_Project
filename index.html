<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Presentation: AI-Powered CTI Engine</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --success: #238636;
        }

        body {
            font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #slide-container {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            padding: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Top Navigation Bar for Resources */
        .resource-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            align-items: center;
        }

        .resource-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .resource-nav a:hover {
            color: var(--accent);
        }

        .resource-nav .wiki-link {
            color: var(--accent);
            font-weight: bold;
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .resource-nav .wiki-link:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Company Logo pinned to top right */
        .company-logo {
            position: absolute;
            top: 30px;
            right: 40px;
            height: 50px;
            width: auto;
            z-index: 10;
        }

        .header {
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 25px;
            max-width: 75%; 
        }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-layout {
            display: flex;
            gap: 40px;
            flex: 1;
            overflow: hidden;
        }

        .text-section {
            flex: 1.3;
            overflow-y: auto;
            padding-right: 20px;
        }

        .text-section h3 {
            color: var(--accent);
            font-size: 1.5rem;
            margin-top: 0;
        }

        .text-section p, .text-section li {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .image-section {
            flex: 0.7;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 15px;
        }

        .image-section img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 5px;
        }

        .analogy-footer {
            background: rgba(88, 166, 255, 0.08);
            border-left: 5px solid var(--accent);
            padding: 15px;
            margin-top: 20px;
            font-style: italic;
            color: var(--accent);
            font-size: 1rem;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 25px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button:hover { background: #1f6feb; }
        button:disabled { background: #30363d; cursor: not-allowed; }

        .slide-counter {
            position: absolute;
            bottom: 35px;
            left: 40px;
            color: var(--text-secondary);
            font-weight: bold;
            font-size: 0.9rem;
        }

        ul { padding-left: 20px; }
        
        /* Custom scrollbar for text section */
        .text-section::-webkit-scrollbar { width: 6px; }
        .text-section::-webkit-scrollbar-track { background: var(--card-bg); }
        .text-section::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="slide-container">
        <!-- Resource Navigation Bar -->
        <nav class="resource-nav">
            <a href="wiki.html" class="wiki-link">📖 WEAKYPEDIA PROJECT</a>
            <a href="https://github.com/Vishalrsjce/AI_CTI_Project" target="_blank"><span>🔗</span> GITHUB REPO</a>
            <a href="https://drive.google.com/drive/folders/1u64C-3ldEKadFXYt4_p_Q2aqUPK89CNi?usp=sharing" target="_blank"><span>📊</span> DATASETS</a>
            <a href="https://vishalrsjce.github.io/SecIntel-AI-Platform-Overhaul-and-Design/" target="_blank"><span>🎨</span> LEGACY DESIGN</a>
        </nav>

        <!-- Company Logo (Looks in PPT_PICS folder) -->
        <img src="PPT_PICS/company_logo.png" alt="Logo" class="company-logo">

        <div class="header">
            <h1 id="slide-title">Executive Summary</h1>
        </div>

        <div class="main-layout">
            <div class="text-section" id="slide-text">
                <!-- Content will be injected by slides.js -->
            </div>
            <div class="image-section" id="slide-image">
                <!-- Image will be injected by slides.js -->
            </div>
        </div>

        <div class="slide-counter" id="counter">MANAGER VIEW | Slide 1 of 6</div>

        <div class="controls">
            <button id="prevBtn" onclick="moveSlide(-1)">PREVIOUS</button>
            <button id="nextBtn" onclick="moveSlide(1)">NEXT</button>
        </div>
    </div>

    <!-- Ensure slides.js is in the same folder -->
    <script src="slides.js"></script>
</body>
</html>
